name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write   # Required for SignPath trusted build verification
  actions: read      # Required for SignPath to read artifact & workflow info

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v${TAG} does not match package.json version ${PKG}"
            exit 1
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: arm64
          - os: windows-latest
            platform: win
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libudev-dev

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec electron-vite build

      # Windows: build WITHOUT code signing (SignPath will sign later)
      - name: Build Electron app (Windows)
        if: matrix.platform == 'win'
        run: pnpm exec electron-builder --win --${{ matrix.arch }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # macOS: build with Apple code signing & notarization
      - name: Build Electron app (macOS)
        if: matrix.platform == 'mac'
        run: pnpm exec electron-builder --mac --${{ matrix.arch }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      # Linux: build without code signing
      - name: Build Electron app (Linux)
        if: matrix.platform == 'linux'
        run: pnpm exec electron-builder --linux --${{ matrix.arch }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v7
        with:
          name: artifact-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage

  sign-windows:
    needs: build
    # Only run when SignPath is configured
    if: vars.SIGNPATH_ORGANIZATION_ID != ''
    runs-on: ubuntu-latest
    steps:
      - name: Download unsigned Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: artifact-win
          path: unsigned

      - name: Upload unsigned exe for SignPath
        id: upload-unsigned
        uses: actions/upload-artifact@v7
        with:
          name: artifact-win-unsigned
          if-no-files-found: error
          path: unsigned/*.exe

      - name: Submit signing request to SignPath
        id: signpath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: signed

      - name: Upload signed Windows artifact
        uses: actions/upload-artifact@v7
        with:
          name: artifact-win-signed
          if-no-files-found: error
          path: signed/*.exe

  release:
    needs: [build, sign-windows]
    # Run even if sign-windows was skipped (SignPath not yet configured)
    if: always() && startsWith(github.ref, 'refs/tags/') && needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: artifact-mac

      - uses: actions/download-artifact@v8
        with:
          name: artifact-linux

      # Use signed artifact if available, otherwise fall back to unsigned
      - name: Download signed Windows artifact
        if: needs.sign-windows.result == 'success'
        uses: actions/download-artifact@v8
        with:
          name: artifact-win-signed

      - name: Download unsigned Windows artifact
        if: needs.sign-windows.result != 'success'
        uses: actions/download-artifact@v8
        with:
          name: artifact-win

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            *.dmg
            *.exe
            *.AppImage
